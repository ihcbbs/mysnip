# --- 系统基础优化 ---
fs.file-max = 2000000
fs.nr_open = 2000000
vm.overcommit_memory = 1
vm.swappiness = 10
# 6.8 内核处理高并发更强，进一步放宽监听队列
net.core.somaxconn = 32768
net.core.netdev_max_backlog = 16384

# --- 网络缓冲区优化 (针对 BDP = 500Mbps * 125ms ≈ 7.8MB) ---
# 给足 4-8 倍 BDP 空间以应对突发和多流竞争
net.core.rmem_max = 67108864
net.core.wmem_max = 67108864
net.core.rmem_default = 7500000
net.core.wmem_default = 7500000
net.core.optmem_max = 131072

# TCP 缓冲区调整：min, default, max
# default 调高到 2MB，有助于提升高延迟下的初始窗口速度
net.ipv4.tcp_rmem = 4096 2097152 67108864
net.ipv4.tcp_wmem = 4096 2097152 67108864

# --- TCP 核心特性 ---
net.ipv4.tcp_window_scaling = 1
net.ipv4.tcp_timestamps = 1
net.ipv4.tcp_sack = 1
net.ipv4.tcp_fack = 1
net.ipv4.tcp_no_metrics_save = 1
net.ipv4.tcp_slow_start_after_idle = 0
net.ipv4.tcp_mtu_probing = 1
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_ecn = 1

# --- 拥塞控制 (6.8 内核推荐 fq + bbr) ---
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# --- 连接复用与安全 (针对高并发短连接) ---
net.ipv4.tcp_max_tw_buckets = 2000000
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_probes = 3
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.ip_local_port_range = 1024 65535
net.ipv4.tcp_max_syn_backlog = 32768
net.ipv4.tcp_syncookies = 1

# --- 防火墙与转发 ---
net.ipv4.ip_forward = 1
# 增加连接跟踪表大小，防止高并发下丢包
net.netfilter.nf_conntrack_max = 1048576
net.netfilter.nf_conntrack_tcp_timeout_established = 3600
net.ipv6.conf.all.forwarding = 1
