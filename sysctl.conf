# --- 系统基础优化 ---
fs.file-max = 1000000
vm.overcommit_memory = 1
# 增加内核监听队列，在高并发连接时非常重要
net.core.somaxconn = 16384
net.core.netdev_max_backlog = 10000

# --- 网络缓冲区优化 (针对长肥管道 BDP 优化) ---
# CN2 GIA 延迟 ~124ms，假设带宽 100M-500M，需要较大的缓冲区
net.core.rmem_max = 67108864
net.core.wmem_max = 67108864
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576
net.core.optmem_max = 65536

# TCP 读写缓冲区：min, default, max
# max 设置为 32MB 或 64MB 足以支撑 500Mbps+ 的单线程吞吐
net.ipv4.tcp_rmem = 4096 1048576 67108864
net.ipv4.tcp_wmem = 4096 1048576 67108864

# --- TCP 核心性能优化 ---
net.ipv4.tcp_window_scaling = 1
net.ipv4.tcp_timestamps = 1
net.ipv4.tcp_sack = 1
net.ipv4.tcp_no_metrics_save = 1
# 禁用空闲后的慢启动，保持高连通后的速度
net.ipv4.tcp_slow_start_after_idle = 0
# 开启 MTU 探测，防止因为路径上某些节点 MTU 小导致的断连
net.ipv4.tcp_mtu_probing = 1
net.ipv4.tcp_fastopen = 3

# --- 拥塞控制算法 (BBR) ---
# 6.8 内核下，fq + bbr 是跨海传输的最优解
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# --- 连接复用与安全 ---
net.ipv4.tcp_max_tw_buckets = 500000
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 20
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_probes = 3
net.ipv4.tcp_keepalive_intvl = 15
net.ipv4.ip_local_port_range = 1024 65535
net.ipv4.tcp_max_syn_backlog = 16384
net.ipv4.tcp_syncookies = 1

# --- 转发与防火墙 ---
net.ipv4.ip_forward = 1
net.netfilter.nf_conntrack_max = 1000000
